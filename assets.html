<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assets | CapitAI</title>
  <style>
    :root { --bg: #081120; --line: #223150; --text: #edf2ff; --muted: #a8b3cf; --primary: #6d7cff; --shadow: 0 20px 45px rgba(0, 0, 0, 0.28); --radius: 20px; --panel: #101a2e; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: radial-gradient(circle at top right, rgba(109, 124, 255, 0.12), transparent 28%), radial-gradient(circle at top left, rgba(57, 198, 233, 0.08), transparent 22%), var(--bg); color: var(--text); }
    a { color: inherit; text-decoration: none; }
    .container { width: min(1180px, calc(100% - 32px)); margin: 0 auto; padding: 28px 0 48px; }
    .navbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 24px; padding: 16px 18px; background: rgba(16, 26, 46, 0.78); border: 1px solid var(--line); border-radius: 18px; box-shadow: var(--shadow); }
    .brand { display: flex; flex-direction: column; gap: 4px; }
    .brand-title { font-size: 1.25rem; font-weight: 700; }
    .brand-subtitle { color: var(--muted); font-size: 0.9rem; }
    .nav-links { display: flex; flex-wrap: wrap; gap: 10px; }
    .nav-link { padding: 10px 14px; border-radius: 999px; border: 1px solid var(--line); color: var(--muted); background: rgba(255,255,255,0.02); cursor: pointer; }
    .nav-link.active { color: white; background: rgba(109, 124, 255, 0.18); border-color: rgba(109, 124, 255, 0.5); }
    .panel { padding: 22px; margin-bottom: 22px; background: linear-gradient(180deg, rgba(21,33,58,0.98), rgba(16,26,46,0.98)); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); }
    .section-title { margin: 0 0 14px; font-size: 1.1rem; }
    .layout-2 { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 18px; }
    .table-wrap { overflow-x: auto; }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table th, .data-table td { padding: 14px 10px; border-bottom: 1px solid var(--line); text-align: left; }
    .data-table th { color: #9fb0db; font-size: 0.82rem; text-transform: uppercase; }
    .ladder-container { display: flex; flex-direction: column; gap: 12px; margin-top: 15px; }
    .ladder-row { display: grid; grid-template-columns: 80px 1fr; gap: 16px; align-items: center; padding: 14px; background: rgba(255,255,255,0.03); border-radius: 12px; border: 1px solid var(--line); }
    .tier-badge { font-size: 0.75rem; font-weight: 800; padding: 6px; text-align: center; border-radius: 8px; background: var(--primary); color: white; }
    .ladder-info { display: flex; flex-direction: column; gap: 4px; }
    .ladder-title { font-weight: 700; font-size: 0.95rem; }
    .ladder-note { font-size: 0.82rem; color: var(--muted); }
    a.nav-link[href="simulator.html"] {
  display: none !important;
}
  </style>

  <script src="mock-data.js"></script>
  <script src="state.js"></script> 
</head>
<body>
  <div class="container">
    <nav class="navbar">
      <div class="brand">
        <div class="brand-title">CapitAI</div>
        <div class="brand-subtitle">Unified Wealth Wallet</div>
      </div>

      <div class="global-money-bar" style="display: flex; gap: 20px; background: rgba(255,255,255,0.05); padding: 8px 18px; border-radius: 12px; border: 1px solid var(--line);">
        <div style="text-align: right;">
          <div style="font-size: 0.65rem; color: var(--muted); text-transform: uppercase;">Total Net Worth</div>
          <div id="nav-sgd" style="font-weight: 700; color: #fff;">S$ 286,500</div>
        </div>
        <div style="width: 1px; background: var(--line); margin: 4px 0;"></div>
        <div style="text-align: right;">
          <div style="font-size: 0.65rem; color: var(--muted); text-transform: uppercase;">USD Equivalent</div>
          <div id="nav-usd" style="font-weight: 700; color: var(--primary);">$ 211,437</div>
        </div>
      </div>

      <div class="nav-links">
  <a class="nav-link" href="index.html">Dashboard</a>
  <a class="nav-link active" href="assets.html">Assets</a>
  <a class="nav-link" href="insights.html">Insights</a>
</div>
    </nav>

    <div class="layout-2">
      <div class="panel">
        <h2 class="section-title">Liquidity Ladder (Time-to-Cash)</h2>
        <div class="ladder-container" id="liquidity-ladder"></div>
      </div>

      <div class="panel">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;">
            <h2 class="section-title" style="margin: 0;">Asset type / value breakdown</h2>
            <button class="nav-link" onclick="openConnectModal()" style="font-size: 0.7rem; color: var(--primary); border-color: var(--primary);">+ Link New Account</button>
        </div>
        <div class="table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>Asset</th>
                <th>Type</th>
                <th>Value</th>
              </tr>
            </thead>
            <tbody id="asset-breakdown-body"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="connect-modal" style="display: none; position: fixed; inset: 0; background: rgba(8, 17, 32, 0.85); z-index: 2000; align-items: center; justify-content: center; backdrop-filter: blur(8px);">
    <div style="width: min(420px, 90%); padding: 28px; background: #101a2e; border: 1px solid #6d7cff; border-radius: 20px; position: relative;">
      <button onclick="closeConnectModal()" style="position: absolute; top: 15px; right: 20px; background: none; border: none; color: #a8b3cf; font-size: 1.5rem; cursor: pointer;">&times;</button>
      <h2 style="margin: 0 0 10px; font-size: 1.1rem;">Select Provider</h2>
      <p style="color: #a8b3cf; font-size: 0.9rem; margin-bottom: 20px;">Link an account to your Digital Twin.</p>
      <div style="display: flex; flex-direction: column; gap: 12px;">
        <button class="nav-link" style="text-align:left;" onclick="mockConnect('DBS / POSB')">🏦 Bank (DBS / POSB)</button>
        <button class="nav-link" style="text-align:left;" onclick="mockConnect('Tiger Brokers')">📈 Investment (Tiger Brokers)</button>
        <button class="nav-link" style="text-align:left;" onclick="mockConnect('Coinbase')">🦊 Crypto (Coinbase)</button>
      </div>
    </div>
  </div>

  <div id="toast" style="position: fixed; top: 20px; right: 20px; padding: 12px 20px; border-radius: 12px; background: #6d7cff; color: white; opacity: 0; transition: 0.3s; pointer-events: none; z-index: 3000;"></div>

  <script>
    function formatMoney(value) {
      return new Intl.NumberFormat("en-SG", { style: "currency", currency: "SGD", maximumFractionDigits: 0 }).format(Number(value || 0));
    }

    function getBadgeStyle(category) {
      switch(category) {
        case "Bank": return "background: rgba(79, 70, 229, 0.15); color: #818cf8; border: 1px solid rgba(79, 70, 229, 0.4);";
        case "Investment": return "background: rgba(6, 182, 212, 0.15); color: #22d3ee; border: 1px solid rgba(6, 182, 212, 0.4);";
        case "Crypto": return "background: rgba(245, 158, 11, 0.15); color: #fbbf24; border: 1px solid rgba(245, 158, 11, 0.4);";
        case "Private Asset": return "background: rgba(16, 185, 129, 0.15); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.4);";
        default: return "background: rgba(255, 255, 255, 0.05); color: #a8b3cf;";
      }
    }

    function getSharedPortfolio() {
      if (typeof StateManager !== "undefined") {
        if (StateManager.getScenarioAdjustedPortfolio) {
          return StateManager.getScenarioAdjustedPortfolio();
        }
        return StateManager.getPortfolio();
      }
      return window.mockPortfolio;
    }

    // Modal Control Logic
    function openConnectModal() { document.getElementById("connect-modal").style.display = "flex"; }
    function closeConnectModal() { document.getElementById("connect-modal").style.display = "none"; }

    function mockConnect(provider) {
      const toast = document.getElementById("toast");
      toast.textContent = `Linking ${provider}...`;
      toast.style.opacity = "1";
      closeConnectModal();

      // 1. Get the current active state (Simulation OR Default)
      const savedData = localStorage.getItem('savedPortfolio');
      let currentPortfolio = savedData ? JSON.parse(savedData) : JSON.parse(JSON.stringify(window.mockPortfolio));

      let category = "";
      let newItem = {};

      // 2. Define the new asset data
      if (provider === "DBS / POSB") {
        category = "Bank";
        newItem = { coin: "POSB Savings", symbol: "SGD", wallet: "POSB Digibank", balance: 5000, valueUsd: 3690 };
      } else if (provider === "Tiger Brokers") {
        category = "Investment";
        newItem = { coin: "Tiger Portfolio", symbol: "TIGER", wallet: "Tiger Brokers", balance: 10000, valueUsd: 7380 };
      } else if (provider === "Coinbase") {
        category = "Crypto";
        newItem = { coin: "Coinbase Wallet", symbol: "CB", wallet: "Coinbase App", balance: 2000, valueUsd: 1476 };
      }

      if (category && currentPortfolio.detailedAccounts[category]) {
        // 3. Add to the detailed list
        currentPortfolio.detailedAccounts[category].push(newItem);
        
        // 4. Update the Breakdown Table values
        const summaryMap = { "Bank": "Cash Accounts", "Investment": "ETF / Equity Portfolio", "Crypto": "Crypto Wallets" };
        const summaryItem = currentPortfolio.assetBreakdown.find(a => a.asset === summaryMap[category]);
        if (summaryItem) summaryItem.value += newItem.balance;
        
        // 5. IMPORTANT: Update the Net Worth relative to the CURRENT state
        currentPortfolio.summary.netWorth += newItem.balance;

        // 6. Save the new combined state (Simulation + New Asset)
        localStorage.setItem('savedPortfolio', JSON.stringify(currentPortfolio));
        localStorage.setItem('selectedCategory', category);
      }

      setTimeout(() => {
        window.location.href = 'details.html'; 
      }, 1200);
    }


    function renderTables() {
      // 1. Get the data (Checking simulation memory first)
      const savedData = localStorage.getItem('savedPortfolio');
      const portfolio = savedData ? JSON.parse(savedData) : getSharedPortfolio();
      
      const assetBody = document.getElementById("asset-breakdown-body");
      const ladderContainer = document.getElementById("liquidity-ladder");
      const assetBreakdown = Array.isArray(portfolio.assetBreakdown) ? portfolio.assetBreakdown : [];
      
      // 2. Render Liquidity Ladder
      if (ladderContainer) {
        ladderContainer.innerHTML = assetBreakdown.map(item => `
          <div class="ladder-row">
            <div class="tier-badge">${item.liquidityTier || "T+?"}</div>
            <div class="ladder-info">
              <div class="ladder-title">${item.asset} — ${formatMoney(item.value)}</div>
              <div class="ladder-note">${item.ladderNote || ""}</div>
            </div>
          </div>
        `).join("");
      }

      // 3. Render Breakdown Table
      if (assetBody) {
        assetBody.innerHTML = assetBreakdown.map(item => {
          const categoryMap = { 
            "Cash Accounts": "Bank", 
            "ETF / Equity Portfolio": "Investment", 
            "Crypto Wallets": "Crypto", 
            "Private Equipment": "Private Asset" 
          };
          const category = categoryMap[item.asset];
          return `
            <tr onclick="goToDetails('${category}')" style="cursor:pointer;" onmouseover="this.style.background='rgba(109,124,255,0.05)'" onmouseout="this.style.background='transparent'">
              <td><span style="padding: 6px 14px; border-radius: 8px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; border: 1px solid currentColor; display: inline-block; min-width: 160px; text-align: center; ${getBadgeStyle(category)}">${item.asset}</span></td>
              <td><em style="color: var(--muted);">${item.type}</em></td>
              <td style="font-family: monospace; font-size: 1rem; font-weight: 600;">${formatMoney(item.value)}</td>
            </tr>
          `;
        }).join("");
      }
    }

    function goToDetails(category) {
      localStorage.setItem('selectedCategory', category);
      window.location.href = 'details.html';
    }

    function syncGlobalNavbar() {
      const sgdEl = document.getElementById("nav-sgd");
      const usdEl = document.getElementById("nav-usd");
      const savedData = localStorage.getItem('savedPortfolio');
      const portfolio = savedData ? JSON.parse(savedData) : window.mockPortfolio;
      
      if (portfolio && portfolio.summary) {
          const totalSgd = portfolio.summary.netWorth;
          if (sgdEl) sgdEl.textContent = formatMoney(totalSgd);
          if (usdEl) usdEl.textContent = new Intl.NumberFormat("en-US", {
              style: "currency",
              currency: "USD",
              maximumFractionDigits: 0
          }).format(totalSgd * 0.738);
      }
    }

    document.addEventListener("DOMContentLoaded", () => {
      renderTables();
      syncGlobalNavbar();
    });

    // Listen for changes from other tabs (Dashboard reset/simulation)
    window.addEventListener("storage", () => {
      renderTables();
      syncGlobalNavbar();
    });
  </script>

</body>
</html>
